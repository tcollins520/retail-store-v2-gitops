apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: orders
  namespace: argocd

spec:
  project: retail-store-production

  sources:
    # Helm chart source
    - repoURL: https://github.com/tcollins520/retail-store-v2-platform-engineering.git
      targetRevision: main
      path: helm/orders

      helm:
        releaseName: orders
        valueFiles:
          - $values/environments/production/orders/values.yaml

    # Production values source
    - repoURL: https://github.com/tcollins520/retail-store-v2-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
