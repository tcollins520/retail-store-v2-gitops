# -----------------------------------------------------------------------------
# Retail Store v2
# OpenTelemetry Logs Collector
#
# Collects Kubernetes container logs from every EKS node and exports them to
# Amazon CloudWatch Logs.
#
# Runs as a DaemonSet so every node has a local collector.
# -----------------------------------------------------------------------------

apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector

metadata:
  name: retail-logs
  namespace: observability

  labels:
    app.kubernetes.io/name: retail-logs
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: retail-store-v2
    app.kubernetes.io/managed-by: argocd

spec:
  mode: daemonset

  serviceAccount: adot-collector

  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0

  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods

  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true

  config:

    receivers:

      filelog:

        include:
          - /var/log/pods/*/*/*.log

        exclude:
          - /var/log/pods/kube-system_*/*/*.log
          - /var/log/pods/observability_*/*/*.log
          - /var/log/pods/argocd_*/*/*.log

        include_file_path: true

        start_at: end

    processors:

      # Prevent collector OOM
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100

      # Enrich log records with Kubernetes metadata
      k8sattributes:
        auth_type: serviceAccount

        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.pod.name
            - k8s.container.name
            - k8s.node.name

      # Batch log records before export
      batch:
        timeout: 10s
        send_batch_size: 100

    exporters:

      awscloudwatchlogs:
        region: us-east-1

        log_group_name: "/aws/eks/retail-production-eks/application"

        log_stream_name: "${K8S_NODE_NAME}"

    extensions:

      health_check:
        endpoint: 0.0.0.0:13133

    service:

      extensions:
        - health_check

      pipelines:

        logs:

          receivers:
            - filelog

          processors:
            - memory_limiter
            - k8sattributes
            - batch

          exporters:
            - awscloudwatchlogs